# docker-compose.yml — Knowledge World 生产部署编排
# 3 个 service：frontend (nginx) + backend (FastAPI) + redis
# 使用：docker compose up -d
#
# 环境变量：docker compose 会自动读取项目根目录的 .env 文件
# 请在项目根目录创建 .env（参考 .env.docker.example），至少包含：
#   REDIS_PASSWORD=你的强密码
#   OPENAI_API_KEY=你的key
#   REDIS_URL=redis://:你的强密码@redis:6379/0
#   CORS_ORIGINS=http://你的服务器IP

services:
  # ─── 后端 API ──────────────────────────────────────────────────
  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: kw-backend
    restart: unless-stopped
    # 从根目录 .env 读取所有环境变量（OPENAI_API_KEY / REDIS_URL / CORS_ORIGINS 等）
    env_file:
      - .env
    environment:
      - APP_ENV=production
      # REDIS_URL 不在此覆盖：由 .env 提供（含密码），与 redis service 的 REDIS_PASSWORD 保持一致
    depends_on:
      redis:
        condition: service_healthy
    # 不映射端口到宿主机：由 frontend 的 nginx 反代访问
    # 仅暴露给同 network 的 frontend 容器
    networks:
      - kw-net
    # 日志大小限制（防止日志撑爆磁盘）
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─── 前端（nginx 静态托管 + 反代后端） ─────────────────────────
  frontend:
    build:
      # 构建上下文为项目根目录（vite publicDir 需要 assets/）
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: kw-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      # 如需 HTTPS，取消下面注释并挂载证书
      # - "443:443"
    depends_on:
      - backend
    networks:
      - kw-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Redis（session 存储） ────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: kw-redis
    restart: unless-stopped
    # 生产环境加密码 + 内存限制（2G 服务器防 OOM）
    # REDIS_PASSWORD 必须在 .env 中设置（无默认值，强制注入防止可预测密码）
    # .env 中 REDIS_URL 需与该密码一致：redis://:密码@redis:6379/0
    command: >
      sh -c 'redis-server
      --requirepass "$REDIS_PASSWORD"
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru'
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}
    # 不映射端口到宿主机：仅内网访问
    networks:
      - kw-net
    # 数据持久化（可选：session 有 7 天 TTL，重启丢失可接受）
    volumes:
      - redis-data:/data
    healthcheck:
      # healthcheck 必须带认证，否则 NOAUTH 错误导致健康检查失败
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 10s
      timeout: 3s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

networks:
  kw-net:
    driver: bridge

volumes:
  redis-data:
