# docker-compose.yml — Knowledge World 生产部署编排
# 3 个 service：frontend (nginx) + backend (FastAPI) + redis
# 使用：docker compose up -d

services:
  # ─── 后端 API ──────────────────────────────────────────────────
  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: kw-backend
    restart: unless-stopped
    env_file:
      - ./apps/backend/.env
    environment:
      - APP_ENV=production
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    # 不映射端口到宿主机：由 frontend 的 nginx 反代访问
    # 仅暴露给同 network 的 frontend 容器
    networks:
      - kw-net
    # 日志大小限制（防止日志撑爆磁盘）
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─── 前端（nginx 静态托管 + 反代后端） ─────────────────────────
  frontend:
    build:
      # 构建上下文为项目根目录（vite publicDir 需要 assets/）
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: kw-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      # 如需 HTTPS，取消下面注释并挂载证书
      # - "443:443"
    depends_on:
      - backend
    networks:
      - kw-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Redis（session 存储） ────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: kw-redis
    restart: unless-stopped
    # 生产环境加密码 + 内存限制（2G 服务器防 OOM）
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-kw_redis_dev_change_me}
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
    # 不映射端口到宿主机：仅内网访问
    networks:
      - kw-net
    # 数据持久化（可选：session 有 7 天 TTL，重启丢失可接受）
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

networks:
  kw-net:
    driver: bridge

volumes:
  redis-data:
