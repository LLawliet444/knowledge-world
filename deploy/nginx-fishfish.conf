# 宿主机 nginx 配置 — fishfish.space/knowledge-world
#
# 部署步骤：
#   1. 复制到 /etc/nginx/sites-available/knowledge-world.conf
#   2. ln -s /etc/nginx/sites-available/knowledge-world.conf /etc/nginx/sites-enabled/
#   3. nginx -t && systemctl reload nginx
#   4. DNS 指向服务器后，用 certbot 申请证书：
#      certbot --nginx -d fishfish.space
#
# 架构：
#   浏览器 → 宿主机 nginx(443) → Docker 容器(127.0.0.1:8080) → 容器内 nginx → 静态文件/backend

# gzip 压缩
gzip on;
gzip_vary on;
gzip_min_length 1024;
gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
gzip_comp_level 6;

server {
    listen 80;
    server_name fishfish.space;

    # certbot 会自动添加 HTTPS 重定向和 443 server block

    # ─── Knowledge World 子路径应用 ───────────────────────────────
    # 主入口：/knowledge-world/ → 容器（strip prefix）
    location /knowledge-world/ {
        proxy_pass http://127.0.0.1:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # 不带尾斜杠时重定向到带斜杠
    location = /knowledge-world {
        return 301 /knowledge-world/;
    }

    # ─── 公共静态资源（前端代码中硬编码的绝对路径） ───────────────
    # 这些路径在代码中以 /audio/ /scenes/ 等开头，浏览器会从域名根请求
    # 需要代理到容器才能正确加载
    location ~ ^/(audio|vedio|video_background|scenes|nodes|characters|biomes|fog|ui|effects|badges|loading)/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # 根路径可留给其他应用
    location / {
        return 404;
    }
}
